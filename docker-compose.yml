version: '3.8'

services:
  # FastAPI应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haiwailiuxue_app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123
      - DB_NAME=dify_customer
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - haiwailiuxue_network

  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: haiwailiuxue_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=dify_customer
      - MYSQL_USER=haiwai
      - MYSQL_PASSWORD=haiwai123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - haiwailiuxue_network

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: haiwailiuxue_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - haiwailiuxue_network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: haiwailiuxue_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - haiwailiuxue_network

# 数据卷
volumes:
  mysql_data:
  redis_data:

# 网络
networks:
  haiwailiuxue_network:
    driver: bridge
